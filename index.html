<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#5b6cff">
<title>MAGS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-lum="light">

<!-- ============ SCHERMATA: CARICAMENTO ============ -->
<div class="screen-full" id="loading">
  <div class="splash">
    <div class="splash-icon">
      <svg viewBox="0 0 100 100" width="84" height="84">
        <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b6cff"/><stop offset="1" stop-color="#22b8a6"/></linearGradient></defs>
        <rect width="100" height="100" rx="24" fill="url(#sg)"/>
        <path d="M28 38 L66 29 Q72 27.5 69 34 L58 44 L51 39 Z" fill="#fff"/>
        <text x="50" y="64" font-family="Sora" font-weight="800" font-size="26" fill="#fff" text-anchor="middle" letter-spacing="1">MAGS</text>
      </svg>
    </div>
    <div class="spinner"></div>
  </div>
</div>

<!-- ============ SCHERMATA: LOGIN ============ -->
<div class="screen-full hidden" id="login">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 100 100" width="64" height="64">
        <rect width="100" height="100" rx="22" fill="url(#sg)"/>
        <path d="M28 38 L66 29 Q72 27.5 69 34 L58 44 L51 39 Z" fill="#fff"/>
        <text x="50" y="64" font-family="Sora" font-weight="800" font-size="26" fill="#fff" text-anchor="middle" letter-spacing="1">MAGS</text>
      </svg>
    </div>
    <h1 class="auth-title">Bentornato</h1>
    <p class="auth-sub">Accedi alla famiglia</p>

    <label class="field-label" for="email">Email</label>
    <input class="field" type="email" id="email" inputmode="email" autocomplete="email" placeholder="nome@email.it">

    <label class="field-label" for="password">Password</label>
    <input class="field" type="password" id="password" autocomplete="current-password" placeholder="••••••••">

    <button class="btn-primary" id="btn-login">Accedi</button>
    <p class="auth-error hidden" id="login-error"></p>
  </div>
</div>

<!-- ============ SCHERMATA: SETUP PRIMO AVVIO ============ -->
<div class="screen-full hidden" id="setup">
  <div class="auth-card">
    <h1 class="auth-title">Benvenuti in MAGS</h1>
    <p class="auth-sub">Creiamo la vostra famiglia. Potrai modificare tutto più avanti.</p>

    <label class="field-label">Nome famiglia</label>
    <input class="field" type="text" id="su-household" placeholder="Famiglia MAGS" value="Famiglia MAGS">

    <div class="setup-members" id="su-members">
      <!-- righe membro generate da JS -->
    </div>
    <button class="btn-ghost" id="su-add">+ Aggiungi membro</button>

    <label class="field-label" style="margin-top:18px;">Chi sei tu?</label>
    <select class="field" id="su-iam"></select>

    <button class="btn-primary" id="btn-setup">Crea la famiglia</button>
    <p class="auth-error hidden" id="setup-error"></p>
  </div>
</div>

<!-- ============ SCHERMATA: HOME (placeholder per ora) ============ -->
<div class="app hidden" id="home">
  <div class="app-screen">
    <header class="greet">
      <div class="kick" id="home-date">Oggi</div>
      <h1>Ciao <span class="nm" id="home-name">—</span></h1>
    </header>

    <div class="card">
      <p class="placeholder-text">La famiglia è pronta. Le sezioni (Calendario, Casa, Soldi, Famiglia) arriveranno nei prossimi passi.</p>
    </div>

    <div class="card" id="home-members"></div>

    <button class="btn-ghost" id="btn-logout" style="margin-top:18px;">Esci</button>
  </div>

  <!-- tabbar (le sezioni si attivano nei prossimi step) -->
  <nav class="tabbar">
    <div class="tab on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10l9-7 9 7v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Oggi</div>
    <div class="tab disabled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Calendario</div>
    <div class="tab disabled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>Casa</div>
    <div class="tab disabled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h4"/></svg>Soldi</div>
    <div class="tab disabled"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="3"/><circle cx="17" cy="9" r="2.2"/><path d="M2 20c0-3 3-5 7-5s7 2 7 5M16 14c3 0 5 1.5 5 4"/></svg>Famiglia</div>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
